<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedalboard Planner V9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar">
    <h1>Pedal Planner</h1>

    <div class="control-group">
        <label for="board-search">1. Choose a Board</label>
        <input type="text" id="board-search" placeholder="Search boards...">
        <div id="board-list" class="custom-list"></div>

        <div class="custom-board-inputs">
            <input type="number" id="custom-w" placeholder="W(cm)" min="10" max="200">
            <input type="number" id="custom-h" placeholder="H(cm)" min="10" max="200">
            <button id="custom-board-btn">Create</button>
        </div>
    </div>

    <div id="board-info-panel" style="display: none; background: #222; padding: 12px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #2a9fd6;">
        <h4 id="info-name" style="margin: 0 0 5px 0; color: #fff;">Board Name</h4>
        <div style="font-size: 0.85rem; color: #bbb; display: flex; justify-content: space-between;">
            <span id="info-brand">Brand</span>
            <span id="info-size">60 x 30 cm</span>
        </div>
        <button id="clear-selected-board-btn" class="danger" style="margin-top: 10px; width: 100%; padding: 6px;">Clear Pedals on Board</button>
    </div>

    <div class="control-group" style="flex-grow: 1; display:flex; flex-direction:column; overflow:hidden; margin-top: 10px;">
        <label for="pedal-search">2. Add a Pedal</label>
        <input type="text" id="pedal-search" placeholder="Search brand or name...">
        <div id="pedal-list" class="custom-list" style="flex-grow: 1; max-height: 40vh;"></div>

        <div style="margin-top: 10px;">
            <label><input type="checkbox" id="snap-grid" checked> Snap to 10mm grid</label>
        </div>
    </div>

    <hr style="border: 1px solid #444; width: 100%; margin: 5px 0;">

    <div class="control-group" style="flex-grow: 1; display:flex; flex-direction:column; overflow:hidden;">
        <h3>On Canvas (<span id="pedal-count">0</span>)</h3>
        <ul id="on-canvas-list"></ul>
    </div>

    <div style="text-align: center; color: #888; font-size: 0.85rem; margin-top: auto; padding-bottom: 40px;">
        Zoom: <span id="zoom-readout">100%</span>
    </div>
</div>

<div id="main">
    <div id="toolbar">
        <span style="margin-right:auto; color:#888;">Double-click pedal to delete. Scroll to zoom.</span>
        <button id="fit-to-screen-btn">Fit to screen</button>
        <button id="export-json-btn">Export JSON</button>
        <input type="file" id="import-json-input" accept="application/json" style="display:none">
        <button id="import-json-btn">Import JSON</button>
        <button id="clear-board-btn" class="danger">Clear Canvas</button>
    </div>

    <div id="canvas-container">
        <div id="board-wrapper">
        </div>

        <div id="preview-overlay" class="hidden">
            <img id="preview-image" src="" alt="Preview">
            <h2 id="preview-name"></h2>
        </div>
    </div>
</div>
<div id="bg-shade-selector" style="display: flex; gap: 8px; justify-content: center; align-items: flex-end; margin-top: 18px; margin-bottom: 0;"></div>
<script type="module" src="app.js"></script>
</body>
</html>
