<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedalboard Planner</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
<aside id="sidebar" class="d-flex flex-column">
    <header class="sidebar-brand d-flex align-items-center gap-2 px-3 py-3">
        <i class="bi bi-soundwave brand-icon"></i>
        <h1 class="h5 m-0">Pedalboard Planner</h1>
    </header>

    <div class="sidebar-body d-flex flex-column gap-3 px-3 pb-3 flex-grow-1">

        <section class="control-group">
            <label for="board-search" class="form-label small text-uppercase fw-semibold text-secondary">
                <span class="step-badge">1</span> Choose a board
            </label>
            <input type="text" id="board-search" class="form-control form-control-sm"
                   placeholder="Search boards…" autocomplete="off">
            <div id="board-list" class="custom-list"></div>

            <div class="custom-board-inputs input-group input-group-sm mt-2">
                <input type="number" id="custom-w" class="form-control"
                       placeholder="W cm" min="5" max="200" step="0.5">
                <input type="number" id="custom-h" class="form-control"
                       placeholder="H cm" min="5" max="200" step="0.5">
                <button id="custom-board-btn" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> Create
                </button>
            </div>
        </section>

        <section id="board-info-panel" class="card bg-body-tertiary border-info-subtle" hidden>
            <div class="card-body py-2 px-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div id="info-name" class="fw-semibold small">Board name</div>
                        <div class="text-secondary" style="font-size: .75rem;">
                            <span id="info-brand">Brand</span> · <span id="info-size">60 × 30 cm</span>
                        </div>
                    </div>
                    <button id="clear-selected-board-btn"
                            class="btn btn-outline-danger btn-sm"
                            title="Clear pedals on this board">
                        <i class="bi bi-eraser"></i>
                    </button>
                </div>
            </div>
        </section>

        <section class="control-group flex-grow-1 d-flex flex-column overflow-hidden">
            <label for="pedal-search" class="form-label small text-uppercase fw-semibold text-secondary mb-1">
                <span class="step-badge">2</span> Add a pedal
            </label>
            <input type="text" id="pedal-search" class="form-control form-control-sm"
                   placeholder="Search brand or name…" autocomplete="off">
            <div id="pedal-list" class="custom-list flex-grow-1"></div>

            <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" id="snap-grid" checked>
                <label class="form-check-label small" for="snap-grid">Snap to 10 mm grid</label>
            </div>
        </section>

        <hr class="border-secondary opacity-25 my-1">

        <section class="control-group flex-grow-1 d-flex flex-column overflow-hidden">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="small text-uppercase fw-semibold text-secondary">
                    On canvas
                </span>
                <span class="badge text-bg-secondary" id="pedal-count">0</span>
            </div>
            <ul id="on-canvas-list" class="list-unstyled overflow-auto flex-grow-1 mb-0"></ul>
        </section>
    </div>

    <footer class="sidebar-footer px-3 py-2 small text-secondary d-flex justify-content-between align-items-center">
        <span>Zoom <span id="zoom-readout">100%</span></span>
        <span class="autosave-indicator" id="autosave-indicator" title="Autosaved">
            <i class="bi bi-cloud-check"></i> saved
        </span>
    </footer>
</aside>

<main id="main">
    <div id="toolbar" class="d-flex align-items-center gap-2 px-3 py-2">
        <span class="text-secondary small text-uppercase fw-semibold me-auto">Workspace</span>
        <button id="fit-to-screen-btn" class="btn btn-outline-secondary btn-sm" title="Fit to screen (F)">
            <i class="bi bi-arrows-fullscreen"></i> Fit
        </button>
        <button id="export-json-btn" class="btn btn-outline-secondary btn-sm" title="Export layout JSON">
            <i class="bi bi-download"></i> Export
        </button>
        <input type="file" id="import-json-input" accept="application/json" hidden>
        <button id="import-json-btn" class="btn btn-outline-secondary btn-sm" title="Import layout JSON">
            <i class="bi bi-upload"></i> Import
        </button>
        <button id="clear-board-btn" class="btn btn-outline-danger btn-sm" title="Nuke canvas">
            <i class="bi bi-trash3"></i> Clear
        </button>
    </div>

    <div id="canvas-container">
        <div id="board-wrapper"></div>

        <div id="preview-overlay" class="hidden">
            <img id="preview-image" src="" alt="Preview">
            <h2 id="preview-name"></h2>
            <div id="board-preview-dimensions"></div>
        </div>
    </div>

    <div id="footer-status-bar" class="d-flex justify-content-between align-items-center px-3 py-2 small">
        <span id="help-status-bar"><i class="bi bi-info-circle"></i> Scroll to zoom · drag canvas to pan · click to select</span>
        <div id="bg-shade-selector" class="d-flex gap-2 align-items-center"></div>
    </div>
</main>

<script type="module" src="src/app.js"></script>
</body>
</html>
