<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedal Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="overflow-hidden vh-100 vw-100 d-flex">
    
    <div class="sidebar d-flex flex-column flex-shrink-0 z-3">
        <h4 class="fw-bold mb-3">Pedal Planner</h4>
        <hr class="header-line mb-3">

        <div class="mb-4">
            <label class="section-label d-block mb-2 fw-bold">1. Choose a Board</label>
            <select id="board-select" class="form-select dark-input mb-2">
                <option value="">Select predefined...</option>
            </select>
            
            <div class="d-flex gap-2">
                <input type="number" id="custom-board-w" class="form-control dark-input text-center px-1" placeholder="W(cm)">
                <input type="number" id="custom-board-h" class="form-control dark-input text-center px-1" placeholder="H(cm)">
                <button id="btn-custom-board" class="btn btn-create text-white fw-semibold px-3">Create</button>
            </div>
            <button id="btn-add-board" class="btn btn-sm btn-outline-secondary w-100 mt-2 d-none">Add Selected</button>
        </div>

        <div class="mb-3 position-relative">
            <label class="section-label d-block mb-2 fw-bold">2. Add a Pedal</label>
            <input type="text" id="pedal-search" class="form-control dark-input" placeholder="Search brand or name..." autocomplete="off">
            <ul id="search-results" class="list-group position-absolute w-100 shadow d-none" style="max-height: 300px; overflow-y: auto; z-index: 1050;"></ul>
        </div>

        <div class="form-check mb-4 d-flex align-items-center gap-2 ps-0">
            <input class="m-0" type="checkbox" id="snap-toggle">
            <label class="form-check-label text-light fs-7" for="snap-toggle">Snap to 10mm grid</label>
        </div>

        <hr class="divider-line mb-3">

        <div class="fw-bold fs-6">
            <span id="on-board-count">On Board (0)</span>
        </div>
    </div>

    <div class="canvas-area flex-grow-1 d-flex flex-column position-relative">
        
        <div class="canvas-header d-flex justify-content-between align-items-center px-3 z-2">
            <span class="instructions text-muted small">Drag background to pan. Scroll to zoom. Double-click pedal to delete.</span>
            <button id="btn-nuke" class="btn btn-sm btn-clear text-white fw-semibold">Clear Board</button>
        </div>

        <div id="canvas-container" class="flex-grow-1 position-relative overflow-hidden" style="cursor: grab;">
            
            <div id="empty-state" class="position-absolute top-50 start-50 translate-middle empty-board-dashed d-flex justify-content-center align-items-center z-1 pointer-events-none">
                <span class="text-primary opacity-75 fs-5">Select or create a board</span>
            </div>

            <div id="workspace" class="position-absolute">
                </div>
            
            <div id="preview-overlay" class="position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-75 d-none justify-content-center align-items-center" style="z-index: 2000; pointer-events: none;">
                <img id="preview-img" src="" class="shadow-lg border border-secondary" style="max-height: 80%; max-width: 80%; object-fit: contain;">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
